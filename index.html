<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سامانه تصحیح ورقه‌های امتحانی</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #f7c14f;
    --danger: #f74f4f;
    --success: #4ff7a0;
    --text: #e8eaf6;
    --muted: #7b82a8;
    --score-btn-size: 52px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ─── TOP BAR ─── */
  #topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    z-index: 100;
  }

  #topbar h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
    flex: 1;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .btn.success { background: #1a7a4a; border: 1px solid var(--success); color: var(--success); }
  .btn.success:hover { background: var(--success); color: #0a1a12; }
  .btn.danger { background: var(--danger); }

  #file-input { display: none; }

  /* ─── MAIN LAYOUT ─── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── PDF VIEWER ─── */
  #viewer-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 30px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    background: #0a0c14;
    position: relative;
  }

  #drop-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: 16px;
    color: var(--muted);
  }
  #drop-zone .icon { font-size: 64px; opacity: 0.4; }
  #drop-zone p { font-size: 16px; }
  #drop-zone .hint { font-size: 13px; opacity: 0.6; }

  .page-container {
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    border-radius: 4px;
    overflow: visible;
    margin-top: 28px;
  }

  .page-container canvas {
    display: block;
    border-radius: 4px;
  }

  /* ─── TOTAL SCORE BADGE — now editable text ─── */
  .total-badge {
    position: absolute;
    top: -28px;
    left: 0px;
    background: var(--accent2);
    color: #1a1500;
    border-radius: 10px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(247,193,79,0.35);
    z-index: 10;
  }
  .total-badge .badge-label { font-size: 12px; opacity: 0.75; white-space: nowrap; }
  .total-badge .edit-total {
    background: rgba(0,0,0,0.12);
    border: 1.5px solid rgba(0,0,0,0.18);
    border-radius: 6px;
    padding: 3px 8px;
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #1a1500;
    width: 64px;
    text-align: center;
    cursor: text;
    user-select: text;
    transition: background 0.15s, border 0.15s;
  }
  .total-badge .edit-total:focus {
    outline: none;
    background: rgba(0,0,0,0.22);
    border-color: rgba(0,0,0,0.35);
  }
  .total-badge .edit-total::placeholder { opacity: 0.45; }
  .total-badge .auto-hint {
    font-size: 10px;
    opacity: 0.55;
    white-space: nowrap;
    cursor: pointer;
    text-decoration: underline dotted;
  }
  .total-badge .auto-hint:hover { opacity: 0.9; }

  /* ─── SCORE STAMPS on PDF ─── */
  .score-stamp {
    position: absolute;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: move;
    box-shadow: 0 2px 12px rgba(79,142,247,0.5);
    z-index: 20;
    border: 2px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    gap: 6px;
    animation: popIn 0.15s ease;
    white-space: nowrap;
  }
  @keyframes popIn {
    from { transform: translate(-50%,-50%) scale(0.6); opacity: 0; }
    to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  }
  .score-stamp { transform: translate(-50%, -50%); }
  .score-stamp .remove-stamp {
    cursor: pointer;
    font-size: 11px;
    opacity: 0.7;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .score-stamp .remove-stamp:hover { opacity: 1; background: rgba(255,0,0,0.5); }

  /* ─── SIDE PANEL ─── */
  #sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 14px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  #page-list { display: flex; flex-direction: column; gap: 8px; }
  .page-thumb {
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .page-thumb:hover { background: var(--surface2); }
  .page-thumb.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .page-thumb .num {
    width: 24px; height: 24px; border-radius: 6px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .page-thumb.active .num { background: var(--accent); color: #fff; }

  .mode-btns { display: flex; gap: 6px; }
  .mode-btn {
    flex: 1; padding: 8px 4px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Vazirmatn', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  .label-row {
    display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
  }
  .label-row label { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .label-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px;
    font-family: 'Vazirmatn', sans-serif; font-size: 12px; color: var(--text);
    user-select: text;
  }
  .label-input:focus { outline: none; border-color: var(--accent); }

  #stamp-log { display: flex; flex-direction: column; gap: 4px; }
  .stamp-entry {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 6px;
    background: var(--surface2);
    font-size: 12px;
    transition: background 0.15s;
  }
  .stamp-entry:hover { background: var(--border); }
  .stamp-entry .score-dot {
    width: 28px; height: 22px; border-radius: 4px;
    background: var(--accent);
    color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .stamp-entry .label { flex: 1; }
  .stamp-entry .del { color: var(--danger); font-size: 14px; opacity: 0.6; cursor: pointer; }
  .stamp-entry .del:hover { opacity: 1; }

  /* ─── SCORE PALETTE ─── */
  #score-palette {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
    z-index: 50;
  }

  #palette-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  #palette-header span { font-size: 12px; color: var(--muted); }
  #selected-score-display {
    font-size: 13px; font-weight: 700; color: var(--accent2);
  }

  #score-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .score-btn {
    width: var(--score-btn-size);
    height: var(--score-btn-size);
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Vazirmatn', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .score-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .score-btn:hover::before { opacity: 0.15; }
  .score-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .score-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(79,142,247,0.45);
    transform: translateY(-3px) scale(1.08);
  }
  .score-btn.zero { border-color: var(--danger); }
  .score-btn.zero.selected { background: var(--danger); border-color: var(--danger); box-shadow: 0 4px 16px rgba(247,79,79,0.45); }
  .score-btn.full { border-color: var(--success); }
  .score-btn.full.selected { background: var(--success); border-color: var(--success); color: #0a1a12; box-shadow: 0 4px 16px rgba(79,247,160,0.45); }

  #cursor-badge {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(79,142,247,0.9);
    color: #fff;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 200;
  }
  #cursor-badge.visible { opacity: 1; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #zoom-controls { display: flex; gap: 6px; align-items: center; }
  #zoom-label { font-size: 12px; color: var(--muted); min-width: 38px; text-align: center; }

  .btn.sm { padding: 6px 10px; font-size: 13px; }

  #summary-line {
    font-size: 12px; color: var(--muted); padding: 8px 14px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
  #summary-line span { color: var(--accent2); font-weight: 600; }

  /* ─── PDF EXPORT PROGRESS ─── */
  #export-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,12,20,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #export-overlay.visible { display: flex; }
  #export-overlay .msg { font-size: 16px; font-weight: 600; color: var(--text); }
  #export-overlay .sub { font-size: 13px; color: var(--muted); }
  .progress-bar-wrap {
    width: 280px; height: 6px; background: var(--surface2);
    border-radius: 3px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--accent);
    border-radius: 3px; width: 0%;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>📋 سامانه تصحیح ورقه‌های امتحانی</h1>
  <div id="zoom-controls">
    <button class="btn sm secondary" id="zoom-out">−</button>
    <span id="zoom-label">100%</span>
    <button class="btn sm secondary" id="zoom-in">+</button>
  </div>
  <button class="btn secondary" id="open-btn">📂 بارگذاری PDF</button>
  <button class="btn secondary" id="export-json-btn">💾 JSON</button>
  <button class="btn success" id="export-pdf-btn">⬇ دانلود PDF نهایی</button>
  <input type="file" id="file-input" accept=".pdf">
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div class="sidebar-section">
      <h3>حالت ابزار</h3>
      <div class="mode-btns">
        <button class="mode-btn active" id="mode-stamp">🖊 درج نمره</button>
        <button class="mode-btn" id="mode-move">✋ جابجایی</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>برچسب سؤال</h3>
      <div class="label-row">
        <label>سؤال:</label>
        <input class="label-input" id="q-label" type="text" placeholder="مثلاً: ۱، الف، ..." value="۱">
      </div>
    </div>

    <div class="sidebar-section" style="flex:1; overflow-y:auto;">
      <h3>نمرات ثبت‌شده</h3>
      <div id="stamp-log"></div>
    </div>

    <div id="summary-line">
      <span>مجموع نمرات: </span><span id="total-sum">۰</span>
    </div>

    <div class="sidebar-section">
      <h3>صفحات</h3>
      <div id="page-list"></div>
    </div>

  </div>

  <!-- VIEWER -->
  <div id="viewer-wrap">
    <div id="drop-zone">
      <div class="icon">📄</div>
      <p>فایل PDF را بارگذاری کنید</p>
      <p class="hint">یا فایل را اینجا رها کنید</p>
      <button class="btn" id="open-btn2">📂 انتخاب فایل</button>
    </div>
  </div>

</div>

<!-- SCORE PALETTE -->
<div id="score-palette">
  <div id="palette-header">
    <span>نمره انتخابی:</span>
    <div id="selected-score-display">—</div>
    <span style="font-size:11px;color:var(--muted)">روی صفحه کلیک کنید تا نمره درج شود</span>
  </div>
  <div id="score-buttons"></div>
</div>

<div id="cursor-badge"></div>

<!-- PDF EXPORT OVERLAY -->
<div id="export-overlay">
  <div class="msg">⏳ در حال آماده‌سازی PDF...</div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill"></div></div>
  <div class="sub" id="prog-label">صفحه ۰ از ۰</div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let zoom = 1.0;
let selectedScore = null;
let mode = 'stamp';
let stamps = [];
let stampIdCounter = 0;
// pageData[p] = { totalValue: string }
let pageData = {};

// ─── Score buttons ───
const scores = [];
for (let v = 0; v <= 4; v += 0.25) scores.push(Math.round(v * 100) / 100);

const palette = document.getElementById('score-buttons');
scores.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'score-btn' + (s === 0 ? ' zero' : s === 4 ? ' full' : '');
  btn.dataset.score = s;
  btn.textContent = formatNum(s);
  btn.title = `نمره ${formatNum(s)}`;
  btn.addEventListener('click', () => selectScore(s));
  palette.appendChild(btn);
});

function formatNum(n) {
  return n % 1 === 0 ? n.toString() : n.toFixed(2);
}

function selectScore(s) {
  selectedScore = s;
  document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
  const btn = palette.querySelector(`[data-score="${s}"]`);
  if (btn) btn.classList.add('selected');
  document.getElementById('selected-score-display').textContent = formatNum(s) + ' از ۴';
  if (mode === 'stamp') showCursorBadge(`نمره ${formatNum(s)} — کلیک برای درج`);
}

let badgeTimeout;
function showCursorBadge(msg) {
  const b = document.getElementById('cursor-badge');
  b.textContent = msg;
  b.classList.add('visible');
  clearTimeout(badgeTimeout);
  badgeTimeout = setTimeout(() => b.classList.remove('visible'), 1800);
}

document.getElementById('mode-stamp').addEventListener('click', () => setMode('stamp'));
document.getElementById('mode-move').addEventListener('click', () => setMode('move'));

function setMode(m) {
  mode = m;
  document.getElementById('mode-stamp').classList.toggle('active', m === 'stamp');
  document.getElementById('mode-move').classList.toggle('active', m === 'move');
  document.getElementById('viewer-wrap').style.cursor = m === 'move' ? 'grab' : 'crosshair';
}

// ─── File loading ───
document.getElementById('open-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('open-btn2').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => loadFile(e.target.files[0]));

const viewer = document.getElementById('viewer-wrap');
viewer.addEventListener('dragover', e => { e.preventDefault(); });
viewer.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f?.type === 'application/pdf') loadFile(f); });

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const data = new Uint8Array(e.target.result);
    pdfDoc = await pdfjsLib.getDocument({ data }).promise;
    stamps = [];
    pageData = {};
    renderAllPages();
    buildPageList();
  };
  reader.readAsArrayBuffer(file);
}

// ─── Render pages ───
async function renderAllPages() {
  const vw = document.getElementById('viewer-wrap');
  vw.innerHTML = '';
  const numPages = pdfDoc.numPages;

  for (let p = 1; p <= numPages; p++) {
    const page = await pdfDoc.getPage(p);
    const vp = page.getViewport({ scale: zoom * 1.5 });

    const container = document.createElement('div');
    container.className = 'page-container';
    container.dataset.page = p;
    container.style.width = vp.width + 'px';
    container.style.height = vp.height + 'px';

    // Total score badge — editable text input
    const badge = document.createElement('div');
    badge.className = 'total-badge';
    const savedVal = pageData[p]?.totalValue || '';
    badge.innerHTML = `
      <span class="badge-label">نمره کل ص${p}:</span>
      <input class="edit-total" type="text" inputmode="decimal"
             placeholder="وارد کنید" value="${savedVal}"
             title="نمره کل این صفحه را تایپ کنید" data-page="${p}">
      <span class="auto-hint" title="از مجموع نمرات این صفحه پر کن" data-page="${p}">← خودکار</span>
    `;
    container.appendChild(badge);

    // Save value on change
    badge.querySelector('.edit-total').addEventListener('input', e => {
      if (!pageData[p]) pageData[p] = {};
      pageData[p].totalValue = e.target.value;
    });
    // Auto-fill from stamps
    badge.querySelector('.auto-hint').addEventListener('click', e => {
      e.stopPropagation();
      const sum = stamps.filter(s => s.page === p).reduce((a, s) => a + s.score, 0);
      const rounded = Math.round(sum * 100) / 100;
      badge.querySelector('.edit-total').value = formatNum(rounded);
      if (!pageData[p]) pageData[p] = {};
      pageData[p].totalValue = formatNum(rounded);
    });

    const canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    container.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    container.addEventListener('click', e => onPageClick(e, container, p));
    vw.appendChild(container);

    stamps.filter(s => s.page === p).forEach(s => renderStamp(s));
  }
}

function onPageClick(e, container, page) {
  if (mode !== 'stamp') return;
  if (selectedScore === null) { showCursorBadge('ابتدا یک نمره انتخاب کنید ↓'); return; }
  if (e.target.classList.contains('remove-stamp') ||
      e.target.classList.contains('auto-hint') ||
      e.target.closest('.total-badge')) return;

  const rect = container.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const label = document.getElementById('q-label').value.trim() || `س${page}`;

  const stamp = { id: ++stampIdCounter, page, x, y, score: selectedScore, label };
  stamps.push(stamp);
  renderStamp(stamp);
  updateStampLog();
  updateTotal();
}

function renderStamp(stamp) {
  const container = document.querySelector(`.page-container[data-page="${stamp.page}"]`);
  if (!container) return;

  const el = document.createElement('div');
  el.className = 'score-stamp';
  el.dataset.id = stamp.id;
  el.style.left = stamp.x + 'px';
  el.style.top = stamp.y + 'px';

  if (stamp.score === 0) el.style.background = 'var(--danger)';
  else if (stamp.score === 4) { el.style.background = 'var(--success)'; el.style.color = '#0a1a12'; }

  el.innerHTML = `<span style="opacity:0.75;font-size:11px">${stamp.label}</span> <span>${formatNum(stamp.score)}</span> <span class="remove-stamp" title="حذف">✕</span>`;

  el.querySelector('.remove-stamp').addEventListener('click', e => {
    e.stopPropagation();
    stamps = stamps.filter(s => s.id !== stamp.id);
    el.remove();
    updateStampLog();
    updateTotal();
  });

  makeDraggable(el, stamp);
  container.appendChild(el);
}

function makeDraggable(el, stamp) {
  let dragging = false;
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('remove-stamp')) return;
    dragging = true;
    el.style.cursor = 'grabbing';
    e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const container = el.parentElement;
    const cr = container.getBoundingClientRect();
    const nx = e.clientX - cr.left;
    const ny = e.clientY - cr.top;
    stamp.x = nx; stamp.y = ny;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; el.style.cursor = 'move'; });
}

function updateStampLog() {
  const log = document.getElementById('stamp-log');
  log.innerHTML = '';
  stamps.forEach(s => {
    const div = document.createElement('div');
    div.className = 'stamp-entry';
    div.innerHTML = `<div class="score-dot">${formatNum(s.score)}</div><div class="label">سؤال ${s.label} — ص${s.page}</div><div class="del" title="حذف">✕</div>`;
    div.querySelector('.del').addEventListener('click', () => {
      const el = document.querySelector(`.score-stamp[data-id="${s.id}"]`);
      if (el) el.remove();
      stamps = stamps.filter(x => x.id !== s.id);
      updateStampLog();
      updateTotal();
    });
    log.appendChild(div);
  });
}

function updateTotal() {
  const sum = stamps.reduce((a, s) => a + s.score, 0);
  document.getElementById('total-sum').textContent = formatNum(Math.round(sum * 100) / 100);
}

function buildPageList() {
  const list = document.getElementById('page-list');
  list.innerHTML = '';
  for (let p = 1; p <= pdfDoc.numPages; p++) {
    const div = document.createElement('div');
    div.className = 'page-thumb' + (p === 1 ? ' active' : '');
    div.innerHTML = `<div class="num">${p}</div><span>صفحه ${p}</span>`;
    div.addEventListener('click', () => {
      document.querySelectorAll('.page-thumb').forEach(t => t.classList.remove('active'));
      div.classList.add('active');
      const pc = document.querySelector(`.page-container[data-page="${p}"]`);
      if (pc) pc.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    list.appendChild(div);
  }
}

document.getElementById('zoom-in').addEventListener('click', () => { zoom = Math.min(zoom + 0.15, 3); updateZoom(); });
document.getElementById('zoom-out').addEventListener('click', () => { zoom = Math.max(zoom - 0.15, 0.4); updateZoom(); });

function updateZoom() {
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
  if (pdfDoc) renderAllPages();
}

// ─── JSON Export ───
document.getElementById('export-json-btn').addEventListener('click', () => {
  const data = { stamps, pageData };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'نمرات.json'; a.click();
});

// ─── PDF Export ───
document.getElementById('export-pdf-btn').addEventListener('click', async () => {
  if (!pdfDoc) { alert('ابتدا یک فایل PDF بارگذاری کنید.'); return; }

  const overlay = document.getElementById('export-overlay');
  const progFill = document.getElementById('prog-fill');
  const progLabel = document.getElementById('prog-label');
  overlay.classList.add('visible');

  const numPages = pdfDoc.numPages;
  // Use high-res scale for output
  const EXPORT_SCALE = 2.0;

  // We'll build a multi-page PDF using canvas → image → PDF (via hidden iframe print trick is unreliable)
  // Instead: draw each page to canvas with annotations, collect as images, then use jsPDF-like approach
  // Since we don't have jsPDF loaded, we use a single large canvas approach and generate PDF via canvas.toBlob
  // Best approach without external PDF lib: render all pages to canvas, combine as multi-page PDF using canvas data

  // We'll dynamically load jsPDF from CDN
  if (!window.jspdf) {
    progLabel.textContent = 'در حال بارگذاری کتابخانه PDF...';
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const { jsPDF } = window.jspdf;

  let pdf = null;

  for (let p = 1; p <= numPages; p++) {
    progLabel.textContent = `صفحه ${p} از ${numPages}`;
    progFill.style.width = ((p - 1) / numPages * 100) + '%';

    const page = await pdfDoc.getPage(p);
    const vp = page.getViewport({ scale: EXPORT_SCALE });

    // Create offscreen canvas
    const canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    const ctx = canvas.getContext('2d');

    // Render PDF page
    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    // Draw stamps for this page
    const pageStamps = stamps.filter(s => s.page === p);
    // We need to map from viewer coords to export coords
    // Viewer scale = zoom * 1.5, export scale = EXPORT_SCALE
    const viewerScale = zoom * 1.5;
    const exportScale = EXPORT_SCALE;
    const scaleRatio = exportScale / viewerScale;

    for (const stamp of pageStamps) {
      const ex = stamp.x * scaleRatio;
      const ey = stamp.y * scaleRatio;
      drawStampOnCanvas(ctx, stamp, ex, ey);
    }

    // Draw total badge top-left
    const totalVal = pageData[p]?.totalValue || '';
    if (totalVal !== '') {
      drawTotalBadgeOnCanvas(ctx, p, totalVal);
    }

    // Add to PDF
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const pdfW = vp.width * 0.75; // 72dpi -> pt
    const pdfH = vp.height * 0.75;

    if (p === 1) {
      pdf = new jsPDF({
        orientation: vp.width > vp.height ? 'landscape' : 'portrait',
        unit: 'pt',
        format: [pdfW, pdfH]
      });
    } else {
      pdf.addPage([pdfW, pdfH], vp.width > vp.height ? 'landscape' : 'portrait');
    }

    pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
    progFill.style.width = (p / numPages * 100) + '%';

    // Yield to browser
    await new Promise(r => setTimeout(r, 10));
  }

  progLabel.textContent = 'در حال ذخیره...';
  pdf.save('ورقه-تصحیح‌شده.pdf');

  setTimeout(() => {
    overlay.classList.remove('visible');
    progFill.style.width = '0%';
  }, 600);
});

function drawStampOnCanvas(ctx, stamp, ex, ey) {
  const text = `${stamp.label}: ${formatNum(stamp.score)}`;
  const pad = 10;
  ctx.font = 'bold 24px sans-serif';
  const tw = ctx.measureText(text).width;
  const bw = tw + pad * 2;
  const bh = 36;
  const bx = ex - bw / 2;
  const by = ey - bh / 2;

  // Background
  let bg = '#4f8ef7';
  let fg = '#ffffff';
  if (stamp.score === 0) bg = '#f74f4f';
  else if (stamp.score === 4) { bg = '#4ff7a0'; fg = '#0a1a12'; }

  ctx.save();
  // Rounded rect
  roundRect(ctx, bx, by, bw, bh, 8);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Text
  ctx.fillStyle = fg;
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, ex, ey);
  ctx.restore();
}

function drawTotalBadgeOnCanvas(ctx, page, val) {
  const label = `نمره کل ص${page}: ${val}`;
  ctx.font = 'bold 26px sans-serif';
  const tw = ctx.measureText(label).width;
  const bw = tw + 28;
  const bh = 46;
  const bx = 16;
  const by = 16;

  ctx.save();
  roundRect(ctx, bx, by, bw, bh, 12);
  ctx.fillStyle = '#f7c14f';
  ctx.fill();
  ctx.fillStyle = '#1a1500';
  ctx.font = 'bold 24px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, bx + 14, by + bh / 2);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

viewer.style.cursor = 'crosshair';
</script>
